# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 3
blur_params_radius = 2
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1

shadows = 1
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 12
shadows_blur = 12
shadows_position_x = 0
shadows_position_y = 0

border_radius=8
no_radius_when_single=0
focused_opacity=0.9
unfocused_opacity=0.8

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
zoom_initial_ratio=0.25
zoom_end_ratio=0.9
layer_animation_type_open=zoom
layer_animation_type_close=zoom
animation_type_open=zoom
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.25,0.5,0.75

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.8
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
overviewgappi=20
overviewgappo=30

# Misc
xwayland_persistence=0
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=8
gappiv=8
gappoh=12
gappov=12
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4


# layout support:
# horizontal:tile,scroller,grid,monocle,spiral,dwindle
# vertical:vertical_tile,vertical_scroller,vertical_grid,vertical_monocle,vertical_spiral,vertical_dwindle
tagrule=id:1,layout_name:horizontal_scroller
tagrule=id:2,layout_name:center_tile
tagrule=id:3,layout_name:grid
tagrule=id:4,layout_name:vertical_scroller
tagrule=id:5,layout_name:center_tile
tagrule=id:6,layout_name:vertical_scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# remove layer blur
#layerrule=noblur:1,layer_name:selection





# import
source = ./configs/autostart.conf
source = ./configs/layout.conf
source = ./configs/binds.conf
source = ./configs/colors.conf
source = ./configs/window-rules.conf
source = ./configs/env.conf
source = ./configs/cursor.conf



