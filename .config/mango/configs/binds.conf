# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config


# exit
bind=SUPER,m,quit
bind=ALT,q,killclient




# menu and terminal
bind=Alt,space,spawn,fuzzel
#bind=Alt,T,spawn,foot
bind=SUPER,B,spawn,firefox
bind=ALT,T,spawn,wezterm
bind=SUPER,E,spawn,nemo
bind=SUPER,Q,spawn,kitty


# switch window status
bind=SUPER,g,toggleglobal
bind=ALT,Tab,toggleoverview
bind=SUPER,T,togglefloating
bind=ALT,a,togglemaximizescreen
bind=ALT,f,togglefullscreen
bind=ALT+SHIFT,f,togglefakefullscreen
bind=SUPER,I,minimized
bind=SUPER,o,toggleoverlay
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,Z,toggle_scratchpad



# switch window focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down



# switch layout
bind=SUPER,l,switch_layout




# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0


# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,


# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# tag to left or right
bind=ALT+SHIFT,Left,exchange_client,left
bind=ALT+SHIFT,Right,exchange_client,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps


# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi


# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize




# WORKSPACE SWITCHING (View Tags)
# Alt + Number → Switch to workspace
bind=Alt,1,view,1
bind=Alt,2,view,2
bind=Alt,3,view,3
bind=Alt,4,view,4
bind=Alt,5,view,5
bind=Alt,6,view,6
bind=Alt,7,view,7
bind=Alt,8,view,8
bind=Alt,9,view,9




# MOVE WINDOW TO WORKSPACE (Silent)
# Alt + Ctrl + Number → Move window there
# Stay on current workspace
bind=Alt+Ctrl,1,tagsilent,1
bind=Alt+Ctrl,2,tagsilent,2
bind=Alt+Ctrl,3,tagsilent,3
bind=Alt+Ctrl,4,tagsilent,4
bind=Alt+Ctrl,5,tagsilent,5
bind=Alt+Ctrl,6,tagsilent,6
bind=Alt+Ctrl,7,tagsilent,7
bind=Alt+Ctrl,8,tagsilent,8
bind=Alt+Ctrl,9,tagsilent,9



# MOVE WINDOW TO WORKSPACE (Follow)
# Alt + Shift + Number → Move window there
# Switch to that workspace immediately
bind=Alt+Shift,1,tag,1
bind=Alt+Shift,2,tag,2
bind=Alt+Shift,3,tag,3
bind=Alt+Shift,4,tag,4
bind=Alt+Shift,5,tag,5
bind=Alt+Shift,6,tag,6
bind=Alt+Shift,7,tag,7
bind=Alt+Shift,8,tag,8
bind=Alt+Shift,9,tag,9



# Special keybindings
bind=ALT,D,spawn,bash  # Menu
bind=ALT,Y,spawn,bash ~/.config/mango/scripts/waypaper.sh # Wallpaper
bind=ALT,K,spawn,bash ~/.config/mango/scripts/vipanel.sh # Dashboard

bind=none,XF86MonBrightnessUp,spawn,bash ~/.config/mango/scripts/increase-brightness.sh
bind=none,XF86MonBrightnessDown,spawn,bash ~/.config/mango/scripts/decrease-brightness.sh

bind=none,XF86AudioMute,spawn,bash ~/.config/mango/scripts/mute.sh
bind=none,XF86AudioRaiseVolume,spawn,bash ~/.config/mango/scripts/increase-volume.sh
bind=none,XF86AudioLowerVolume,spawn,bash ~/.config/mango/scripts/decrease-volume.sh
